name: Docker Build and Publish

on:
  pull_request:
    types: [closed]
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adminvpshub/do-cu-binh-van

jobs:
  build-and-push-image:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GH_USER }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Cloudflared and SSH
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Server
        env:
          SERVER_SSH_CONNECTION: ${{ vars.SERVER_SSH_CONNECTION }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_SSH_HOSTNAME: ${{ vars.SERVER_SSH_HOSTNAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USER: ${{ vars.GH_USER }}
        run: |
          # Flatten any newlines that might be in the secret to prevent 'access: command not found' errors
          SSH_CMD="${SERVER_SSH_CONNECTION//$'\n'/ }"
          SSH_CMD="${SSH_CMD//\\/ }" # Remove trailing slashes if they were used for multiline escaping
          SSH_CMD="${SSH_CMD//\{\{SERVER_USER\}\}/$SERVER_USER}"
          SSH_CMD="${SSH_CMD//\{\{SERVER_SSH_HOSTNAME\}\}/$SERVER_SSH_HOSTNAME}"
          
          # Delete obsolete version string in docker-compose.prod.yml to avoid warnings
          sed -i '/version:/d' docker-compose.prod.yml
          
          # Clean variables from potential newlines that break SSH evaluaton
          DEPLOY_PATH="${DEPLOY_PATH//$'\n'/}"
          DEPLOY_PATH="${DEPLOY_PATH//$'\r'/}"
          GH_PAT="${GH_PAT//$'\n'/}"
          GH_PAT="${GH_PAT//$'\r'/}"
          
          eval "$SSH_CMD \"mkdir -p '$DEPLOY_PATH'\""
          cat docker-compose.prod.yml | eval "$SSH_CMD \"cat > '$DEPLOY_PATH/docker-compose.yml'\""
          eval "$SSH_CMD \"cd '$DEPLOY_PATH' && sudo docker logout ghcr.io && echo '$GH_PAT' | sudo docker login ghcr.io -u '$GH_USER' --password-stdin && sudo docker compose pull && (sudo fuser -k 3009/tcp || true) && sudo docker ps -q --filter publish=3009 | xargs -r sudo docker rm -f && sudo docker compose up -d\""
